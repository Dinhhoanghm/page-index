services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      network: host
    env_file: .env
    ports:
      - "8000:8000"
    volumes:
      - ./workspace:/app/workspace
      - ./uploads:/app/uploads
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      network: host
      args:
        # VITE_API_URL is empty so the frontend uses relative URLs (/api/...)
        # which nginx proxies to the backend — no hardcoded localhost needed.
        VITE_API_URL: ""
        # These are cosmetic only (displayed in the sidebar).
        # Docker Compose reads them from the root .env automatically.
        VITE_OPENAI_KEY: ${OPENAI_API_KEY:-}
        VITE_ANTHROPIC_KEY: ${ANTHROPIC_API_KEY:-}
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
